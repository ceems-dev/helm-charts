{{- if and .Values.ceemsAPIServer.enabled (index .Values "ceems-api-server" "grafana" "dashboards" "create") }}
{{- $ceemsAPIDSName := include "ceems-api-server.fullname" (index $.Subcharts "ceems-api-server") -}}
{{- $ceemsPromDSName := (index $.Values "kube-prometheus-stack" "grafana" "sidecar" "datasources" "name") -}}
{{- $ceemsPyroDSName := include "kube-ceems.pyroscope-ds-name" . -}}
{{- $clusterids := list -}}
{{- $clusterid := (include "kube-ceems.cluster-id" .) -}}
{{- range $key, $value := (index .Values "ceems-api-server" "clusters") }}
{{- $clusterids = append $clusterids $value.id -}}
{{- range $path, $_ :=  $.Files.Glob (printf "files/dashboards/%s/**.json" $value.manager) }}
{{- if and (not $.Values.pyroscopeServer.enabled) (contains "pyroscope" $path) }}
{{- continue }}
{{- end }}
{{- if and $.Values.ceemsLB.enabled (hasKey (index $.Values "ceems-lb" "config") "backends") }}
{{- range $_, $backend := index $.Values "ceems-lb" "config" "backends" }}
{{- if and (eq $backend.id $value.id) (hasKey $backend "tsdb") }}
{{- $ceemsPromDSName = printf "%s-%s-tsdb" (include "ceems-lb.fullname" (index $.Subcharts "ceems-lb")) $value.id -}}
{{- end }}
{{- if and (eq $backend.id $value.id) (hasKey $backend "pyroscope") }}
{{- $ceemsPyroDSName = printf "%s-%s-pyroscope" (include "ceems-lb.fullname" (index $.Subcharts "ceems-lb")) $value.id -}}
{{- end }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "ceems-api-server.fullname" (index $.Subcharts "ceems-api-server") }}-{{ $value.id }}-{{ $path | base | replace "." "-" }}-dashboard
  namespace: {{ include "ceems-api-server.namespace" (index $.Subcharts "ceems-api-server") }}
  labels:
    {{ tpl (index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "label") . }}: {{ tpl (index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "labelValue") . }}
    {{- include "ceems-api-server.labels" (index $.Subcharts "ceems-api-server") | nindent 4 }}
  annotations:
    {{ index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "folderAnnotation" }}: CEEMS-ClusterID-{{ $value.id }}-Manager-{{ $value.manager }}
data:
  {{ $path | base }}: |-
    {{ $.Files.Get $path | replace "${VAR_ORGID}" "1" | replace "${DS_PROMETHEUS}" $ceemsPromDSName | replace "${DS_CEEMS-API}" $ceemsAPIDSName | replace "${DS_GRAFANA-PYROSCOPE-DATASOURCE}" $ceemsPyroDSName | replace "${VAR_CLUSTERID}" $value.id | replace "${VAR_ENDPOINT}" "" | nindent 4 }}
{{- end }}
{{- end }}
{{- if and (index .Values "ceems-api-server" "monitoring" "enabled") (not (has $clusterid $clusterids)) }}
{{- range $path, $_ :=  $.Files.Glob "files/dashboards/k8s/**.json" }}
{{- if $.Values.ceemsLB.enabled }}
{{- $ceemsPromDSName = printf "%s-%s-tsdb" (include "ceems-lb.fullname" (index $.Subcharts "ceems-lb")) $clusterid }}
{{- $ceemsPyroDSName = printf "%s-%s-pyroscope" (include "ceems-lb.fullname" (index $.Subcharts "ceems-lb")) $clusterid }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "ceems-api-server.fullname" (index $.Subcharts "ceems-api-server") }}-{{ $clusterid }}-{{ $path | base | replace "." "-" }}-dashboard
  namespace: {{ include "ceems-api-server.namespace" (index $.Subcharts "ceems-api-server") }}
  labels:
    {{ tpl (index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "label") . }}: {{ tpl (index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "labelValue") . }}
    {{- include "ceems-api-server.labels" (index $.Subcharts "ceems-api-server") | nindent 4 }}
  annotations:
    {{ index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "folderAnnotation" }}: CEEMS-ClusterID-{{ $clusterid }}-Manager-k8s
data:
  {{ $path | base }}: |-
    {{ $.Files.Get $path | replace "${VAR_ORGID}" "1" | replace "${DS_PROMETHEUS}" $ceemsPromDSName | replace "${DS_CEEMS-API}" $ceemsAPIDSName | replace "${DS_GRAFANA-PYROSCOPE-DATASOURCE}" $ceemsPyroDSName | replace "${VAR_CLUSTERID}" $clusterid | replace "${VAR_ENDPOINT}" "" | nindent 4 }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "ceems-api-server.fullname" (index $.Subcharts "ceems-api-server") }}-admin-dashboard
  namespace: {{ include "ceems-api-server.namespace" (index $.Subcharts "ceems-api-server") }}
  labels:
    {{ tpl (index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "label") . }}: {{ tpl (index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "labelValue") . }}
    {{- include "ceems-api-server.labels" (index $.Subcharts "ceems-api-server") | nindent 4 }}
  annotations:
    {{ index $.Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "folderAnnotation" }}: CEEMS-Admin
data:
  cluster-status.json: |-
    {{ $.Files.Get "files/dashboards/admin/cluster-status.json" | replace "${DS_PROMETHEUS}" (index .Values "kube-prometheus-stack" "grafana" "sidecar" "datasources" "name") | nindent 4 }}
{{- end }}
