apiVersion: v2
name: kube-ceems
description: A Helm chart for deploying CEEMS
icon: https://raw.githubusercontent.com/ceems-dev/ceems/main/website/static/img/logo.png
keywords:
  - ceems-exporter
  - ceems-api-server
  - ceems-lb
  - prometheus
  - grafana
  - exporter
  - ceems
  - monitoring
  - gpu
  - nvidia
  - amd
  - energy
  - emissions
  - performance
  - io
  - network
  - ebpf
type: application
version: 1.17.0
# renovate: github=ceems-dev/ceems
appVersion: 0.14.4
home: https://ceems-dev.github.io/helm-charts/
sources:
  - https://github.com/ceems-dev/helm-charts
maintainers:
  - name: mahendrapaipuri
    email: mahendra.paipuri@gmail.com
    url: https://github.com/mahendrapaipuri
annotations:
  "artifacthub.io/license": Apache-2.0
  "artifacthub.io/links": |
    - name: Chart Source
      url: https://github.com/ceems-dev/helm-charts
    - name: Upstream Project
      url: https://github.com/ceems-dev/ceems
dependencies:
  - name: ceems-exporter
    version: "0.6.4"
    repository: https://ceems-dev.github.io/helm-charts
    condition: ceemsExporter.enabled
  - name: ceems-api-server
    version: "0.7.5"
    repository: https://ceems-dev.github.io/helm-charts
    condition: ceemsAPIServer.enabled
  - name: ceems-lb
    version: "0.6.5"
    repository: https://ceems-dev.github.io/helm-charts
    condition: ceemsLB.enabled
  - name: kube-prometheus-stack
    version: "87.13.*"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kubePrometheusStack.enabled
  - name: pyroscope
    version: "2.1.0"
    repository: https://grafana.github.io/helm-charts
    condition: pyroscopeServer.enabled
